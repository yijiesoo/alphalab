<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — alphalab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 2em;
            color: #2a5298;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2a5298;
        }

        .password-hint {
            font-size: 0.8em;
            color: #999;
            margin-top: 4px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 0.9em;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .submit-btn:hover {
            background: #1e3c72;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .toggle-link {
            text-align: center;
            font-size: 0.9em;
            color: #666;
        }

        .toggle-link a {
            color: #2a5298;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            color: #ccc;
        }

        .features {
            background: #f0f8ff;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85em;
            color: #555;
            border: 1px solid #2a5298;
            margin-top: 20px;
        }

        .features strong {
            display: block;
            color: #2a5298;
            margin-bottom: 8px;
        }

        .features ul {
            list-style: none;
            padding-left: 0;
        }

        .features li {
            padding: 4px 0;
            margin-left: 16px;
            position: relative;
        }

        .features li:before {
            content: "✓";
            position: absolute;
            left: -14px;
            color: #27ae60;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>📊 alphalab</h1>
            <p>Create your account</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required
                    value="{{ request.form.get('email', '') }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
                <div class="password-hint">At least 6 characters</div>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required
                    minlength="6">
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <div class="toggle-link">
            Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a>
        </div>

        <div class="divider">━━━━━━━━━━</div>

        <div class="features">
            <strong>What you'll get:</strong>
            <ul>
                <li>Real-time stock analysis</li>
                <li>Personal watchlist</li>
                <li>Sentiment analysis</li>
                <li>Data-driven verdicts</li>
            </ul>
        </div>
    </div>
</body>

</html>
