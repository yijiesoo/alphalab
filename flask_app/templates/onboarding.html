<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalize Your Dashboard — alphalab</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='theme.css') }}">
    <style>
        body { background: var(--light-bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Roboto, sans-serif; }
        .onboarding-container {
            max-width: 420px; margin: 60px auto; background: var(--card-bg); border-radius: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.10); padding: 40px 32px;
        }
        h2 { margin-bottom: 18px; font-size: 1.5em; text-align: center; }
        label { font-weight: 600; margin-top: 16px; display: block; }
        select, input[type=checkbox] {
            margin-top: 8px; margin-bottom: 12px; width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color);
        }
        .onboarding-btn {
            margin-top: 18px; padding: 10px 22px; background: #3B82F6; color: white; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <h2>Welcome! Let's personalize your dashboard</h2>
        <form id="onboarding-form">
            <label for="risk">Risk Level</label>
            <select id="risk" name="risk" required>
                <option value="">Select...</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <label for="sectors">Sectors of Interest</label>
            <select id="sectors" name="sectors" multiple required style="height: 80px;">
                <option value="tech">Tech</option>
                <option value="healthcare">Healthcare</option>
                <option value="finance">Finance</option>
                <option value="energy">Energy</option>
                <option value="consumer">Consumer</option>
                <option value="industrial">Industrial</option>
            </select>
            <label for="horizon">Time Horizon</label>
            <select id="horizon" name="horizon" required>
                <option value="">Select...</option>
                <option value="short">Short-term (weeks)</option>
                <option value="medium">Medium-term (months)</option>
                <option value="long">Long-term (years)</option>
            </select>
            <button type="submit" class="onboarding-btn">Finish</button>
        </form>
    </div>
    <script>
    document.getElementById("onboarding-form").onsubmit = async function(e) {
        e.preventDefault();
        const risk = document.getElementById("risk").value;
        const sectors = Array.from(document.getElementById("sectors").selectedOptions).map(o => o.value);
        const horizon = document.getElementById("horizon").value;
        await fetch("/api/onboarding", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({risk, sectors, horizon})
        });
        window.location.href = "/home";
    }
    </script>
</body>
</html>
