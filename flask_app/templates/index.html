<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Factor Lab Backtest</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; }
      #log { white-space: pre-wrap; background:#111; color:#eee; padding:10px; height:400px; overflow:auto; }
      button { padding:10px 16px; }
      #images-container { margin-top: 30px; }
      .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-top: 15px; }
      .image-item { border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
      .image-item img { max-width: 100%; height: auto; }
      .image-item p { margin: 10px 0 0 0; font-size: 12px; color: #666; }
    </style>
  </head>
  <body>
    <h2>Factor Lab — Backtest Runner</h2>
    <p>Click "Run backtest" to execute the project's run_backtest.py.</p>
    <button id="run">Run backtest</button>
    <p id="status">Status: idle</p>
    <h3>Live log</h3>
    <div id="log">(no log yet)</div>

    <div id="images-container">
      <h3>Output Images</h3>
      <div id="images-grid" class="image-grid"></div>
    </div>

    <script>
      const runBtn = document.getElementById("run");
      const statusEl = document.getElementById("status");
      const logEl = document.getElementById("log");
      const imagesGrid = document.getElementById("images-grid");

      async function loadImages() {
        try {
          const res = await fetch("/images");
          const data = await res.json();
          imagesGrid.innerHTML = "";
          if (data.images.length === 0) {
            imagesGrid.innerHTML = "<p>No images yet</p>";
            return;
          }
          data.images.forEach(filename => {
            const div = document.createElement("div");
            div.className = "image-item";
            div.innerHTML = `
              <img src="/outputs/${filename}" alt="${filename}" />
              <p>${filename}</p>
            `;
            imagesGrid.appendChild(div);
          });
        } catch (err) {
          console.error("Error loading images:", err);
        }
      }

      runBtn.onclick = async () => {
        runBtn.disabled = true;
        const res = await fetch("/run", { method: "POST" });
        const j = res.ok ? await res.json() : await res.json();
        statusEl.textContent = "Status: " + (j.status || (j.running ? "running" : "idle"));
        poll();
      };

      let pollTimer = null;
      async function poll() {
        if (pollTimer) return;
        pollTimer = setInterval(async () => {
          const res = await fetch("/status");
          const j = await res.json();
          statusEl.textContent = "Status: " + (j.running ? "running" : "idle");
          logEl.textContent = j.log_tail || "(no log yet)";
          if (!j.running) {
            clearInterval(pollTimer);
            pollTimer = null;
            runBtn.disabled = false;
            loadImages(); // Load images when done
          }
        }, 1000);
      }

      // Load images on page load
      loadImages();
    </script>
  </body>
</html>
