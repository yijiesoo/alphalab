<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis — alphalab</title>
    <!-- Chart.js for price charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Search box */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #2a5298;
        }
        .search-box button {
            padding: 12px 24px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover {
            background: #1e3c72;
        }
        .search-box button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error state */
        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        /* Results section */
        .results {
            display: none;
        }
        .results.show {
            display: block;
        }

        /* Verdict card (traffic light) */
        .verdict-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .verdict-icon {
            font-size: 4em;
            margin-bottom: 16px;
        }
        .verdict-label {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .verdict-label.green { color: #27ae60; }
        .verdict-label.yellow { color: #f39c12; }
        .verdict-label.red { color: #e74c3c; }
        .verdict-text {
            font-size: 0.95em;
            line-height: 1.6;
            color: #666;
        }

        /* Analysis panels grid */
        .panels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .panels-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Panel styling */
        .panel {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .panel-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 16px;
            color: #2a5298;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 12px;
        }
        .panel-content {
            line-height: 1.8;
            font-size: 0.95em;
        }

        /* Factor score display */
        .score-display {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 12px;
        }
        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .score-circle.strong { background: #27ae60; }
        .score-circle.moderate { background: #f39c12; }
        .score-circle.weak { background: #e67e22; }
        .score-circle.negative { background: #e74c3c; }
        .score-info h3 {
            margin-bottom: 4px;
            color: #333;
        }
        .score-info p {
            font-size: 0.9em;
            color: #666;
        }

        /* Macro context */
        .macro-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .macro-row:last-child {
            border-bottom: none;
        }
        .macro-label {
            font-weight: 600;
            color: #555;
        }
        .macro-value {
            color: #2a5298;
            font-weight: 600;
        }
        .macro-summary {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 0.9em;
            line-height: 1.6;
            color: #555;
        }

        /* Sentiment display */
        .sentiment-badge {
            display: inline-block;
            padding: 4px 12px;
            margin-right: 8px;
            margin-bottom: 8px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .sentiment-positive {
            background: #d4edda;
            color: #155724;
        }
        .sentiment-negative {
            background: #f8d7da;
            color: #721c24;
        }
        .sentiment-neutral {
            background: #e2e3e5;
            color: #383d41;
        }
        .sentiment-summary {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 0.9em;
            line-height: 1.6;
            color: #555;
        }
        .headlines {
            margin-top: 12px;
            font-size: 0.9em;
        }
        .headline {
            padding: 8px 0;
            color: #666;
            border-bottom: 1px solid #f0f0f0;
        }
        .headline:last-child {
            border-bottom: none;
        }

        /* Cache indicator */
        .cache-indicator {
            font-size: 0.95em;
            color: #2a5298;
            text-align: center;
            margin-top: 12px;
            padding: 16px 12px;
            border-radius: 6px;
            background: #f0f8ff;
            border: 1px solid #2a5298;
            font-weight: 500;
            line-height: 1.6;
        }
        .cache-indicator div {
            margin: 4px 0;
        }

        /* Company info */
        .company-info {
            background: #f0f4f8;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #555;
        }
        .company-info h2 {
            font-size: 1.3em;
            margin-bottom: 4px;
            color: #2a5298;
        }
        .company-info p {
            font-size: 0.9em;
        }

        /* Watchlist and tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
        .tab-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .tab-btn.active {
            background: #2a5298;
            color: white;
        }

        /* Chart container */
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chart-container canvas {
            max-height: 300px;
        }

        /* Watchlist panel */
        .watchlist-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .watchlist-item:last-child {
            border-bottom: none;
        }
        .watchlist-btn {
            padding: 6px 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .watchlist-btn:hover {
            background: #c0392b;
        }
        .add-watchlist-btn {
            padding: 8px 16px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 10px;
        }
        .add-watchlist-btn:hover {
            background: #229954;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Stock Analysis</h1>
            <p>Data-driven verdict on any stock</p>
        </div>

        <!-- Search box -->
        <div class="search-box">
            <input 
                type="text" 
                id="ticker-input" 
                placeholder="Enter ticker symbol (e.g., NVDA, AAPL, TSLA)" 
                autocomplete="off"
            >
            <button id="analyze-btn">Analyze</button>
        </div>

        <!-- Error display -->
        <div id="error-container"></div>

        <!-- Loading state -->
        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p style="margin-top: 16px;">Analyzing...</p>
        </div>

        <!-- Results -->
        <div id="results" class="results">
            <!-- Company info -->
            <div class="company-info">
                <h2 id="company-name"></h2>
                <p id="company-ticker"></p>
            </div>

            <!-- Verdict card -->
            <div class="verdict-card">
                <div class="verdict-icon" id="verdict-icon"></div>
                <div class="verdict-label" id="verdict-label"></div>
                <div class="verdict-text" id="verdict-text"></div>
            </div>

            <!-- Tabs for different views -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('analysis')">Analysis</button>
                <button class="tab-btn" onclick="switchTab('chart')">📈 Chart (6M)</button>
                <button class="tab-btn" onclick="switchTab('watchlist')">⭐ Watchlist</button>
            </div>

            <!-- Price chart -->
            <div id="chart-tab" class="chart-container" style="display:none;">
                <h3 style="margin-bottom: 20px; color: #2a5298;">6-Month Price Chart</h3>
                <canvas id="priceChart"></canvas>
            </div>

            <!-- Watchlist section -->
            <div id="watchlist-tab" class="watchlist-panel" style="display:none;">
                <h3 style="margin-bottom: 16px; color: #2a5298;">My Watchlist</h3>
                <button class="add-watchlist-btn" id="add-to-watchlist">⭐ Add Current Ticker to Watchlist</button>
                <div id="watchlist-items" style="margin-top: 16px;"></div>
            </div>

            <!-- Analysis panels -->
            <div class="panels-grid">
                <!-- Factor Score Panel -->
                <div class="panel">
                    <div class="panel-title">📈 Factor Score</div>
                    <div class="panel-content">
                        <div class="score-display">
                            <div class="score-circle" id="score-circle"></div>
                            <div class="score-info">
                                <h3 id="score-label"></h3>
                                <p id="score-momentum"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Macro Context Panel -->
                <div class="panel">
                    <div class="panel-title">🌍 Macro Context</div>
                    <div class="panel-content">
                        <div class="macro-row">
                            <span class="macro-label">VIX:</span>
                            <span class="macro-value" id="vix-value"></span>
                        </div>
                        <div class="macro-row">
                            <span class="macro-label">10Y Yield:</span>
                            <span class="macro-value" id="yield-value"></span>
                        </div>
                        <div class="macro-row">
                            <span class="macro-label">Sector:</span>
                            <span class="macro-value" id="sector-value"></span>
                        </div>
                        <div class="macro-row">
                            <span class="macro-label">Sector Momentum:</span>
                            <span class="macro-value" id="sector-signal"></span>
                        </div>
                        <div class="macro-summary" id="macro-summary"></div>
                    </div>
                </div>

                <!-- Sentiment Panel -->
                <div class="panel">
                    <div class="panel-title">📰 News Sentiment</div>
                    <div class="panel-content">
                        <div id="sentiment-badges"></div>
                        <div class="sentiment-summary" id="sentiment-summary"></div>
                        <div class="headlines" id="headlines"></div>
                    </div>
                </div>

                <!-- Cache info -->
                <div class="panel">
                    <div class="panel-title">⚡ Performance</div>
                    <div class="panel-content">
                        <div class="cache-indicator" id="cache-info"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tickerInput = document.getElementById("ticker-input");
        const analyzeBtn = document.getElementById("analyze-btn");
        const loadingEl = document.getElementById("loading");
        const resultsEl = document.getElementById("results");
        const errorContainer = document.getElementById("error-container");

        // Enter key to search
        tickerInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") analyzeBtn.click();
        });

        analyzeBtn.addEventListener("click", async () => {
            const ticker = tickerInput.value.trim().toUpperCase();
            if (!ticker) {
                showError("Please enter a ticker symbol");
                return;
            }

            await analyze(ticker);
        });

        async function analyze(ticker) {
            errorContainer.innerHTML = "";
            loadingEl.style.display = "block";
            resultsEl.classList.remove("show");

            try {
                const response = await fetch(`/api/analyze?ticker=${ticker}`);
                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || "Analysis failed");
                    return;
                }

                displayResults(data);
            } catch (err) {
                showError("Network error. Check console.");
                console.error(err);
            } finally {
                loadingEl.style.display = "none";
            }
        }

        function displayResults(data) {
            // Company info
            document.getElementById("company-name").textContent = data.company;
            document.getElementById("company-ticker").textContent = `${data.ticker}`;

            // Verdict
            const verdictIcon = {"green": "🟢", "yellow": "🟡", "red": "🔴"}[data.verdict];
            const verdictLabel = {"green": "Buy Signal", "yellow": "Hold", "red": "Sell Signal"}[data.verdict];
            document.getElementById("verdict-icon").textContent = verdictIcon;
            document.getElementById("verdict-label").textContent = verdictLabel;
            document.getElementById("verdict-label").className = `verdict-label ${data.verdict}`;
            document.getElementById("verdict-text").textContent = 
                `Based on momentum, macro conditions, and sentiment, this stock is showing a ${verdictLabel.toLowerCase()}.`;

            // Factor Score
            const factor = data.factor;
            const scoreClass = factor.score >= 70 ? "strong" : factor.score >= 50 ? "moderate" : factor.score >= 30 ? "weak" : "negative";
            document.getElementById("score-circle").textContent = factor.score;
            document.getElementById("score-circle").className = `score-circle ${scoreClass}`;
            document.getElementById("score-label").textContent = factor.label;
            document.getElementById("score-momentum").textContent = `Momentum: ${factor.momentum > 0 ? "+" : ""}${factor.momentum}`;

            // Macro
            document.getElementById("vix-value").textContent = data.macro.vix ? `${data.macro.vix} — ${data.macro.vix_label}` : "N/A";
            document.getElementById("yield-value").textContent = data.macro.yield_10y ? `${data.macro.yield_10y}% — ${data.macro.yield_label}` : "N/A";
            document.getElementById("sector-value").textContent = data.macro.sector || "Unknown";
            document.getElementById("sector-signal").textContent = data.macro.sector_signal || "N/A";
            document.getElementById("macro-summary").textContent = data.macro.summary;

            // Sentiment
            const sentimentHtml = `
                <span class="sentiment-badge sentiment-positive">${data.sentiment.positive} Positive</span>
                <span class="sentiment-badge sentiment-negative">${data.sentiment.negative} Negative</span>
                <span class="sentiment-badge sentiment-neutral">${data.sentiment.neutral} Neutral</span>
            `;
            document.getElementById("sentiment-badges").innerHTML = sentimentHtml;
            document.getElementById("sentiment-summary").textContent = data.sentiment.summary;

            const headlinesHtml = data.sentiment.headlines.map(h => 
                `<div class="headline">• ${h}</div>`
            ).join("");
            document.getElementById("headlines").innerHTML = headlinesHtml;

            // Cache info
            const cache = data._cache;
            const now = Date.now() / 1000;
            const ttl = Math.round(Math.max(0, cache.expires_at - now));
            const cacheText = cache.hit 
                ? `✓ Cached result\nTTL: ${ttl}s remaining`
                : `✓ Fresh analysis\nNo cache needed`;
            document.getElementById("cache-info").innerHTML = cacheText.split('\n').map(line => `<div>${line}</div>`).join('');
            document.getElementById("cache-info").style.textAlign = 'center';

            // Save to history and load watchlist
            saveAnalysisToHistory(data);
            loadWatchlist();
            loadPriceChart(data.ticker);
            
            // Enable watchlist button
            document.getElementById("add-to-watchlist").onclick = () => addToWatchlist(data.ticker);
            
            resultsEl.classList.add("show");
        }

        function showError(msg) {
            errorContainer.innerHTML = `<div class="error">${msg}</div>`;
        }

        // ===== NEW FEATURES: Charts, Watchlist, History =====
        let priceChart = null;
        const sessionId = `session_${Date.now()}`;

        function switchTab(tab) {
            // Hide all tabs
            document.getElementById("chart-tab").style.display = "none";
            document.getElementById("watchlist-tab").style.display = "none";
            
            // Show selected tab
            if (tab === "chart") {
                document.getElementById("chart-tab").style.display = "block";
            } else if (tab === "watchlist") {
                document.getElementById("watchlist-tab").style.display = "block";
            }

            // Update button states
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            event.target.classList.add("active");
        }

        async function loadPriceChart(ticker) {
            try {
                const response = await fetch(`/api/price-chart?ticker=${ticker}`);
                const data = await response.json();

                if (!response.ok) return;

                const ctx = document.getElementById("priceChart");
                if (!ctx) return;

                // Destroy old chart if exists
                if (priceChart) priceChart.destroy();

                priceChart = new Chart(ctx, {
                    type: "line",
                    data: {
                        labels: data.prices.map(p => new Date(p[0]).toLocaleDateString()),
                        datasets: [{
                            label: `${ticker} Price`,
                            data: data.prices.map(p => p[1]),
                            borderColor: "#2a5298",
                            backgroundColor: "rgba(42, 82, 152, 0.1)",
                            tension: 0.1,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true }
                        },
                        scales: {
                            y: { beginAtZero: false }
                        }
                    }
                });
            } catch (e) {
                console.error("Failed to load price chart:", e);
            }
        }

        async function addToWatchlist(ticker) {
            try {
                const response = await fetch("/api/watchlist", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, ticker })
                });

                if (response.ok) {
                    alert(`✅ ${ticker} added to watchlist!`);
                    loadWatchlist();
                } else {
                    const error = await response.json();
                    alert(`❌ ${error.error}`);
                }
            } catch (e) {
                console.error("Failed to add to watchlist:", e);
            }
        }

        async function loadWatchlist() {
            try {
                const response = await fetch(`/api/watchlist?session_id=${sessionId}`);
                const data = await response.json();

                const container = document.getElementById("watchlist-items");
                if (!data.watchlist || data.watchlist.length === 0) {
                    container.innerHTML = "<p style='color: #999;'>No items in watchlist yet.</p>";
                    return;
                }

                container.innerHTML = data.watchlist.map(item => `
                    <div class="watchlist-item">
                        <span><strong>${item.ticker}</strong> — Added ${new Date(item.added_at).toLocaleDateString()}</span>
                        <button class="watchlist-btn" onclick="removeFromWatchlist('${item.ticker}')">Remove</button>
                    </div>
                `).join("");
            } catch (e) {
                console.error("Failed to load watchlist:", e);
            }
        }

        async function removeFromWatchlist(ticker) {
            try {
                const response = await fetch(`/api/watchlist?session_id=${sessionId}&ticker=${ticker}`, {
                    method: "DELETE"
                });

                if (response.ok) {
                    alert(`✅ ${ticker} removed from watchlist!`);
                    loadWatchlist();
                }
            } catch (e) {
                console.error("Failed to remove from watchlist:", e);
            }
        }

        async function saveAnalysisToHistory(data) {
            try {
                await fetch("/api/save-analysis", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        session_id: sessionId,
                        ticker: data.ticker,
                        verdict: data.verdict,
                        factor_score: data.factor.score,
                        macro_context: data.macro,
                        sentiment: data.sentiment
                    })
                });
            } catch (e) {
                console.error("Failed to save analysis:", e);
            }
        }
    </script>
</body>
</html>
