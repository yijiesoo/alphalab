version: '3.8'

services:
  # Flask Web Application
  web:
    build: .
    container_name: alphalab-web
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=flask_app/app.py
      - PYTHONUNBUFFERED=1
      
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      
      # Firebase Configuration
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
      - FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}
      
      # Email Configuration (for feedback)
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      
      # App Configuration
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CACHE_TTL_SECONDS=900
    
    volumes:
      # Mount data directory for persistent backtest results
      - ./data:/app/data
      # Mount alphalab-ml package if available
      - ../alphalab-ml:/app/alphalab-ml:ro
    
    depends_on:
      - redis
    
    networks:
      - alphalab-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache (Optional but Recommended)
  redis:
    image: redis:7-alpine
    container_name: alphalab-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - alphalab-network
    restart: unless-stopped

# Networks
networks:
  alphalab-network:
    driver: bridge

# Volumes
volumes:
  redis-data:
    driver: local
