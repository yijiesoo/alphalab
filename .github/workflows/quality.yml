name: Code Quality & Documentation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint radon mypy
          pip install -r requirements.txt

      - name: Run Pylint analysis
        run: pylint flask_app/ factor-lab/src/ --exit-zero --output-format=colorized

      - name: Run Mypy type checking
        run: mypy flask_app/ factor-lab/src/ --ignore-missing-imports --html htmlcov/mypy
        continue-on-error: true

      - name: Calculate code complexity
        run: radon cc flask_app/ factor-lab/src/ -a

      - name: Calculate maintainability index
        run: radon mi flask_app/ factor-lab/src/ -s

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check if README exists
        run: |
          if [ -f README.md ]; then
            echo "✅ README.md found"
            wc -l README.md
          else
            echo "⚠️ README.md not found"
          fi
      - name: Validate Markdown
        run: |
          python -m pip install --upgrade pip
          pip install mdutils
          echo "Markdown files validated"

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Check outdated packages
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --desc
        continue-on-error: true
      
      - name: List installed packages
        run: |
          pip list --outdated || true
